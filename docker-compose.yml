services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    image: luba30analyst/docker-practice-app-db:v1
    container_name: practice-db
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    image: luba30analyst/docker-practice-app-client:v1
    container_name: practice-client
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_HOST: db
      PG_PORT: "5432"
      PG_USER: appuser
      PG_PASSWORD: apppass
      PG_DB: appdb
