name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Причина сборки"
        required: false
        default: "manual build"
  push:
    branches: [ main ]

env:
  IMAGE_NAME: luba30analyst/docker-practice-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push v1
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:v1
          build-args: APP_VERSION=v1

      - name: Build and push v2
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:v2
          build-args: APP_VERSION=v2

      - name: Push latest tag
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          build-args: APP_VERSION=v2
